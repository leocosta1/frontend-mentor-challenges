<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <title>Frontend Mentor | Profile card component</title>
</head>

<body>
    <main class="card">
        <div class="top">
        </div>
        <div class="mid">
            <div class="avatar">
                <img src="images/image-victor.jpg" alt="Victor">
            </div>

            <div class="profile">
                <strong>Victor Crest</h3>
                <span id="age">26</span>
            </div>

            <span>London</span>
        </div>
        <div class="bottom">
            <div>
                <strong>80K</strong>
                <span>Followers</span>
            </div>
            <div>
                <strong>803K</strong>
                <span>Likes</span>
            </div>
            <div>
                <strong>1.4K</strong>
                <span>Photos</span>
            </div>
        </div>
    </main>

    <footer>
        <p class="attribution">
            Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
            Coded by <a href="https://github.com/leocosta1" target="_blank">Leonardo Costa</a>.
        </p>
    </footer>
</body>

</html>
